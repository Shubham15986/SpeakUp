services:
  - type: web
    name: speak-up-backend
    env: node
    rootDir: backend
    buildCommand: NODE_ENV= npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production

  - type: web
    name: speak-up-frontend
    env: static
    rootDir: frontend
    buildCommand: NODE_ENV= npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: speak-up-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
